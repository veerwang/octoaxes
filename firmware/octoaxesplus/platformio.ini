; =============================================================================
; Octoaxes Plus Firmware - PlatformIO Configuration
; Multi-axis Motion Controller for SQUID Microscope Platform
; Target: Teensy 4.1 (ARM Cortex-M7 @ 600MHz)
; =============================================================================

[platformio]
name = octoaxesplus
description = Multi-axis motion control firmware for precision microscopy
default_envs = teensy41
src_dir = .

; 生成 compile_commands.json 用于 clangd LSP 支持
; 运行 pio run -t compiledb 生成
extra_configs =

; =============================================================================
; Common Settings (shared across all environments)
; =============================================================================
[common]
framework = arduino
platform = teensy
board = teensy41

; Library dependencies
lib_deps =
    fastled/FastLED @ ^3.6.0
    bakercp/PacketSerial @ ^1.4.0

; Common build flags
build_flags =
    -D ARDUINO_TEENSY41
    -D USE_HC154_CS    ; 共享 tmc/ 中的 TMC_SPI 走 74HC154 片选分支（squid++ 双相机硬件）
    -I tmc
    ; Optimization
    -O2
    ; Warnings
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Wno-deprecated-copy    ; 禁用 Teensy 框架 DMAChannel.h 的警告

; Source filter
build_src_filter =
    +<*>
    -<.git/>
    -<test/>
    -<docs/>

; =============================================================================
; Production Environment
; =============================================================================
[env:teensy41]
extends = common

; CPU frequency: 600MHz (default), options: 24/150/396/450/528/600/720/816/912/960
board_build.f_cpu = 600000000L

; Build configuration
build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -ffunction-sections
    -fdata-sections

; Linker optimization - remove unused code
build_unflags =
    -Os

; Upload settings
upload_protocol = teensy-cli

; Serial monitor
monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time

; =============================================================================
; Debug Environment
; =============================================================================
[env:teensy41_debug]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -D CORE_DEBUG_LEVEL=5
    -g3
    -ggdb

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time
    log2file

; =============================================================================
; Development Environment (with extra warnings)
; =============================================================================
[env:teensy41_dev]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -Werror=return-type
    -Wshadow
    -Wformat=2
    -g

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF

; =============================================================================
; High Performance Environment (overclock to 720MHz)
; WARNING: Ensure adequate cooling before using this configuration
; =============================================================================
[env:teensy41_fast]
extends = common

board_build.f_cpu = 720000000L

build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -D HIGH_PERFORMANCE
    -O3
    -ffunction-sections
    -fdata-sections

upload_protocol = teensy-cli

monitor_speed = 2000000

; =============================================================================
; No-Interlock Environment (for stations without laser interlock hardware)
; 用于未接激光联锁信号（octoaxesplus 中 INTERLOCK = pin 38）的工位：禁用
; illumination_interlock_ok 检查，否则 D1-D8 TTL 输出（荧光通道）永远拉不起来。
; 警告：仅在确认无激光风险时使用。LED 矩阵（明场）不经联锁，不受影响。
; =============================================================================
[env:teensy41_nointerlock]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D DISABLE_LASER_INTERLOCK

; =============================================================================
; Legacy LED Matrix Environment (旧硬件灯珠批次 R/G 字节排列反向)
; 当 LED 矩阵显示出现 "R 滑条管绿、G 滑条管红、B 正常" 现象时使用本环境。
; 根因：FastLED 模板假定灯珠字节排列 BGR，但部分旧批次 APA102 灯珠是 BRG 排列。
; 启用 -D LED_MATRIX_SWAP_RG 让 firmware 在调 led_set_* 时对调 R/G 实参，
; 与旧 Squid functions.cpp:1933 的历史行为等价。
; 详见 illumination.cpp::LED_RG_ARGS 注释。
; =============================================================================
[env:teensy41_legacyled]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D LED_MATRIX_SWAP_RG

[env:teensy41_nointerlock_legacyled]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D DISABLE_LASER_INTERLOCK
    -D LED_MATRIX_SWAP_RG

; =============================================================================
; Other Build Options (uncomment as needed)
; =============================================================================
; To enable verbose SPI debugging:
;   Add -D SPI_DEBUG to build_flags
;
; To enable motion profiling output:
;   Add -D MOTION_PROFILE_DEBUG to build_flags
