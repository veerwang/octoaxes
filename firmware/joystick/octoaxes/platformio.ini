[platformio]
src_dir = .

[env]
platform = teensy
board = teensylc
framework = arduino

; Library dependencies
lib_deps =
    bakercp/PacketSerial@^1.4.0

; Monitor settings
monitor_speed = 115200

; 国内配置（默认）：joystick X/Y 灵敏度系数 /8
[env:teensyLC]

; 海外配置：joystick X/Y 灵敏度系数 /4（同等档位下输出 2x）
[env:teensyLC_overseas]
build_flags = -D REGION_OVERSEAS
