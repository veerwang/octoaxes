; =============================================================================
; Octoaxes Firmware - PlatformIO Configuration
; Multi-axis Motion Controller for SQUID Microscope Platform
; Target: Teensy 4.1 (ARM Cortex-M7 @ 600MHz)
; =============================================================================

[platformio]
name = octoaxes
description = Multi-axis motion control firmware for precision microscopy
default_envs = teensy41
src_dir = .
include_dir = tmc

; 生成 compile_commands.json 用于 clangd LSP 支持
; 运行 pio run -t compiledb 生成
extra_configs =

; =============================================================================
; Common Settings (shared across all environments)
; =============================================================================
[common]
framework = arduino
platform = teensy
board = teensy41

; Library dependencies
lib_deps =
    fastled/FastLED @ ^3.6.0
    bakercp/PacketSerial @ ^1.4.0

; Common build flags
build_flags =
    -D ARDUINO_TEENSY41
    -I tmc
    ; Optimization
    -O2
    ; Warnings
    -Wall
    -Wextra
    -Wno-unused-parameter

; Source filter
build_src_filter =
    +<*>
    -<.git/>
    -<test/>
    -<docs/>

; =============================================================================
; Production Environment
; =============================================================================
[env:teensy41]
extends = common

; CPU frequency: 600MHz (default), options: 24/150/396/450/528/600/720/816/912/960
board_build.f_cpu = 600000000L

; Build configuration
build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -ffunction-sections
    -fdata-sections

; Linker optimization - remove unused code
build_unflags =
    -Os

; Upload settings
upload_protocol = teensy-cli

; Serial monitor
monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time

; =============================================================================
; Debug Environment
; =============================================================================
[env:teensy41_debug]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -D CORE_DEBUG_LEVEL=5
    -g3
    -ggdb

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time
    log2file

; =============================================================================
; Development Environment (with extra warnings)
; =============================================================================
[env:teensy41_dev]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -Werror=return-type
    -Wshadow
    -Wformat=2
    -g

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF

; =============================================================================
; High Performance Environment (overclock to 720MHz)
; WARNING: Ensure adequate cooling before using this configuration
; =============================================================================
[env:teensy41_fast]
extends = common

board_build.f_cpu = 720000000L

build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -D HIGH_PERFORMANCE
    -O3
    -ffunction-sections
    -fdata-sections

upload_protocol = teensy-cli

monitor_speed = 2000000

; =============================================================================
; Safety Options (uncomment as needed)
; =============================================================================
; To disable laser safety interlock:
;   Add -D DISABLE_LASER_INTERLOCK to build_flags
;   WARNING: Only for systems without lasers. Removes safety protection.
;
; To enable verbose SPI debugging:
;   Add -D SPI_DEBUG to build_flags
;
; To enable motion profiling output:
;   Add -D MOTION_PROFILE_DEBUG to build_flags
